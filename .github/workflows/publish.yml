name: Publish

on:
  push:
    tags:
      - "kwery-mcp@*"
      - "kwery-cli@*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish kwery-mcp
        if: startsWith(github.ref, 'refs/tags/kwery-mcp@')
        run: pnpm --filter kwery-mcp publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish kwery-cli
        if: startsWith(github.ref, 'refs/tags/kwery-cli@')
        run: pnpm --filter kwery-cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
