name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: MCP unit + integration tests (with coverage)
        run: cd kwery-mcp && pnpm vitest run --coverage

      - name: CLI unit + integration tests (with coverage)
        run: cd kwery-cli && pnpm vitest run --coverage

      - name: Repo structure tests
        run: pnpm test:structure

      - name: Install script tests
        run: pnpm test:install

      - name: Upload MCP coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mcp
          path: kwery-mcp/coverage/

      - name: Upload CLI coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cli
          path: kwery-cli/coverage/

  smoke:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install

      - name: Build
        run: pnpm build

      - name: MCP smoke tests
        run: pnpm test:smoke
        env:
          KWERY_API_KEY: ${{ secrets.KWERY_API_KEY }}

      - name: CLI smoke tests
        run: pnpm smoke:cli
        env:
          KWERY_API_KEY: ${{ secrets.KWERY_API_KEY }}
